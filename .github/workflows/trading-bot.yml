name: Trading Bot
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install python-binance python-dotenv requests
      - name: Restore positions and ledger
        uses: actions/cache@v4
        with:
          path: logs/
          key: live-logs-${{ github.run_number }}
          restore-keys: |
            live-logs-
      - name: Create logs directory
        run: mkdir -p logs
      - name: Run bot (single pass)
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          BINANCE_TESTNET: "true"
          FTM_SERVER_URL: ${{ secrets.FTM_SERVER_URL }}
          FTM_EMAIL: ${{ secrets.FTM_EMAIL }}
          FTM_API_KEY: ${{ secrets.FTM_API_KEY }}
          FTM_SYSTEM_UUID: ${{ secrets.FTM_SYSTEM_UUID }}
          FTM_ACCOUNT_INDEX: "0"
          ACTIVE_BROKER: "ftm"
          RISK_PER_TRADE_PCT: "0.2"
          MAX_OPEN_TRADES: "3"
          MAX_DAILY_DRAWDOWN_PCT: "2.5"
          MAX_TOTAL_DRAWDOWN_PCT: "5.0"
          LOG_LEVEL: "INFO"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LEDGER_PATH: "logs/ledger.jsonl"
        run: python main.py --broker ftm --single-pass
      - name: Print ledger
        run: |
          echo "=== LEDGER (last 20 entries) ==="
          if [ -f logs/ledger.jsonl ]; then
            tail -20 logs/ledger.jsonl
          else
            echo "No ledger file found"
          fi
          echo "=== OPEN POSITIONS ==="
          if [ -f logs/live_positions.json ]; then
            cat logs/live_positions.json
          else
            echo "No positions file found"
          fi
      - name: Commit logs to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ledger.jsonl logs/live_positions.json || true
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add logs/ledger.jsonl logs/live_positions.json || true
          git diff --staged --quiet || git commit -m "bot run: update logs [skip ci]"
          git push || true
      - name: Save positions and ledger
        uses: actions/cache@v4
        with:
          path: logs/
          key: live-logs-${{ github.run_number }}
